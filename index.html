<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSANDIC</title>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(-45deg, #000000, #333333, #000000);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
            
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card { text-align: center; width: 100%; max-width: 320px; display: flex; flex-direction: column; align-items: center; }
        
        /* Стили для логотипа льва */
        .lion-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            color: #fff; /* Цвет льва - белый, чтобы выделялся */
        }

        h1 { font-size: 32px; letter-spacing: -2px; margin: 0 0 5px 0; }
        .role { font-size: 14px; color: #ccc; margin-bottom: 30px; font-weight: 300; }
        
        .bio { font-size: 14px; color: #fff; margin-bottom: 30px; line-height: 1.6; border-top: 1px solid #555; padding-top: 20px; width: 100%; }
        .bio p { margin: 5px 0; }
        
        .btn { display: flex; align-items: center; justify-content: center; background: #fff; color: #000; text-decoration: none; padding: 16px; border-radius: 12px; font-weight: 700; margin-bottom: 12px; transition: 0.2s; font-size: 15px; width: 100%; box-sizing: border-box;}
        .btn svg { margin-right: 10px; width: 22px; height: 22px; }
        .btn:active { transform: scale(0.97); opacity: 0.8; }
    </style>
</head>
