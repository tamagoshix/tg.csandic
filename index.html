<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>csandic | Визитка</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Базовые настройки страницы */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Глубокий темный фон */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        /* Контейнер карточки */
        .card {
            background-color: #1e293b;
            width: 100%;
            max-width: 320px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Настройки аватара (твоей картинки) */
        .avatar-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            background-color: #ffffff; /* Белый фон, чтобы черного льва было хорошо видно */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #38bdf8; /* Голубая обводка */
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            overflow: hidden;
        }

        .avatar-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        /* Текстовые элементы */
        h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            margin: 0 0 30px 0;
            color: #94a3b8;
            font-size: 14px;
        }

        /* Ссылки (Кнопки) */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        /* Стили для Telegram */
        .btn-tg {
            background-color: #2AABEE;
            box-shadow: 0 4px 15px rgba(42, 171, 238, 0.3);
        }

        .btn-tg:hover {
            background-color: #2298D6;
            box-shadow: 0 6px 20px rgba(42, 171, 238, 0.4);
        }

        /* Стили для VK */
        .btn-vk {
            background-color: #0077FF;
            box-shadow: 0 4px 15px rgba(0, 119, 255, 0.3);
        }

        .btn-vk:hover {
            background-color: #0066DB;
            box-shadow: 0 6px 20px rgba(0, 119, 255, 0.4);
        }

        /* Иконки в кнопках */
        .btn svg {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar-container">
            <img src="image.png" alt="Логотип льва">
        </div>
        
        <h1>csandic</h1>
        <p class="subtitle">Добро пожаловать в мой профиль</p>

        <div class="links-container">
            <a href="https://t.me/csandic" target="_blank" class="btn btn-tg">
                <svg viewBox="0 0 24 24">

                </svg>

        </div>
    </div>

</body>
</html>
