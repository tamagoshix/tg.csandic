<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSANDIC</title>
    <style>
        /* Базовые стили и обнуление */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Чтобы горошины не создавали скролл */
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* --- ЭФФЕКТЫ ФОНА --- */

        /* 1. Зернистость (Noise overlay) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Текстура шума (очень маленькая и зацикленная) */
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4t9fAAAAVFBMVEUAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAM78SRAAAAEHRSTlMGEhMYGiIkKistMDIzODlCWVpkS0wAAACpSURBVDjL7ZPFDsAgDATL9v//m4u6pU3SkAnXN4wHwIn4IuKLiC8ivogoIrKI6B/iKCI6U5w7uYNo5E4iOnInER25k4iO3ElER+4koiN3EtGRO4noyJ1EdOROIjpyJxEduZOIjtxJRIfuJKIjdxLRkTuJ6MidRHTkTiI6cicRHbmTiI6cicRH7iSiI3cS0ZE7ieiY3EFER+4goiN3ENGRN4joT95I5A4iOnInER25/8YF2QAAAABJRU5ErkJggg==');
            background-size: 100px 100px;
            opacity: 0.08; /* Еле заметный шум, чтобы не мешал */
            z-index: 1; /* Поверх фона, но под контентом */
            pointer-events: none;
        }

        /* 2. Горошины-вспышки (Хаотичные) */
        .flash {
            position: fixed;
            width: 150px; /* Размер горошины */
            height: 150px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            opacity: 0;
            z-index: 0; /* Самый нижний слой */
            filter: blur(20px); /* Размытие для мягкости */
            pointer-events: none;
        }

        /* Левая горошина: появляется хаотично слева-сверху/снизу */
        .flash-left {
            animation: flashLeftAnimation 15s infinite ease-in-out;
        }

        /* Правая горошина: появляется хаотично справа-середина/снизу */
        .flash-right {
            animation: flashRightAnimation 18s infinite ease-in-out;
            animation-delay: 4s; /* Разнос по времени */
        }

        /* АНИМАЦИИ ГОРОШИН */

        /* Левая: хаотичное появление и движение */
        @keyframes flashLeftAnimation {
            0%, 100% { opacity: 0; transform: translate(-100px, 20vh) scale(0.5); }
            5% { opacity: 1; transform: translate(10vw, 15vh) scale(1); }
            15% { opacity: 0; transform: translate(15vw, 30vh) scale(1.2); }
            30% { opacity: 0; transform: translate(-100px, 60vh) scale(0.8); }
            35% { opacity: 0.8; transform: translate(5vw, 70vh) scale(1.1); }
            45% { opacity: 0; transform: translate(10vw, 80vh) scale(1.3); }
            70% { opacity: 0; transform: translate(-100px, 40vh) scale(0.6); }
        }

        /* Правая: хаотичное появление и движение */
        @keyframes flashRightAnimation {
            0%, 100% { opacity: 0; transform: translate(100px, 50vh) scale(0.6); }
            10% { opacity: 0.9; transform: translate(-5vw, 45vh) scale(1); }
            20% { opacity: 0; transform: translate(-10vw, 60vh) scale(1.2); }
            40% { opacity: 0; transform: translate(100px, 80vh) scale(0.7); }
            45% { opacity: 1; transform: translate(-8vw, 75vh) scale(1.1); }
            55% { opacity: 0; transform: translate(-12vw, 90vh) scale(1.4); }
            80% { opacity: 0; transform: translate(100px, 20vh) scale(0.5); }
        }

        /* Анимация пульсации для статуса */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }

        /* --- СТИЛИ КАРТОЧКИ --- */
        .card { 
            text-align: center; 
            width: 100%; 
            max-width: 320px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 10; /* Поверх всех эффектов фона */
            position: relative;
        }
        
        .lion-img { 
            width: 120px; 
            height: 120px; 
            margin-bottom: 25px; 
            border-radius: 50%; 
            background: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .lion-img img { width: 100%; height: 100%; object-fit: cover; }

        /* Статус */
        .status { font-size: 12px; color: #888; display: flex; align-items: center; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
        
        h1 { font-size: 36px; letter-spacing: -2px; margin: 0 0 5px 0; font-weight: 800; }
        .role { font-size: 15px; color: #888; margin-bottom: 15px; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }

        /* Навыки */
        .skills-container { margin-bottom: 30px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .skill-badge { background: #222; border: 1px solid #444; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; color: #fff; }

        /* Текст */
        .bio { font-size: 14px; color: #fff; margin-bottom: 30px; line-height: 1.6; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 20px 0; width: 100%; text-align: center; }
        .bio p { margin: 8px 0; }
        .bio b { color: #fff; }
        
        /* Кнопки */
        .btn { display: flex; align-items: center; justify-content: center; background: #fff; color: #000; text-decoration: none; padding: 16px; border-radius: 12px; font-weight: 700; margin-bottom: 12px; transition: 0.2s; font-size: 15px; width: 100%; box-sizing: border-box; }
        .btn svg { margin-right: 10px; width: 20px; height: 20px; }
        .btn:active { transform: scale(0.97); opacity: 0.8; }
    </style>
</head>
<body>
    <div class="flash flash-left"></div>
    <div class="flash flash-right"></div>

    <div class="card">
        <div class="lion-img">
            <img src="lion.png" alt="Lion Logo">
        </div>

        <div class="status"><span class="dot"></span>Статус: Онлайн</div>

        <h1>CSANDIC</h1>
        <p class="role">Designer & Developer</p>
        
        <div class="skills-container">
            <div class="skill-badge">Python</div>
            <div class="skill-badge">HTML</div>
            <div class="skill-badge">CSS</div>
        </div>
        
        <div class="bio">
            <p>Владею пабликом <b>codesource.gg</b></p>
            <p>Развивал свою площадку игровых товаров</p>
            <p>Работаю гарантом: безопасно и оперативно</p>
            <p>Скоро дроп моего бренда одежды</p>
        </div>

        <a href="https://t.me/csandic" class="btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.56 8.358l-1.936 9.106c-.145.666-.537.828-1.09.516l-3.013-2.222-1.455 1.402c-.161.161-.295.295-.606.295l.215-3.056 5.56-5.025c.241-.215-.054-.334-.373-.122l-6.87 4.323-2.96-.925c-1.373-.427-1.373-1.372.29-2.023l11.53-4.444c.535-.205 1.002.128.835 1.956z"/></svg>
            Telegram
        </a>

        <a href="https://vk.ru/twicebitches" class="btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.162 18.994c.609 0 .858-.406.851-.915-.013-.736-.005-2.031.006-2.962.012-.663.262-.898.74-.863 1.25.088 2.651 1.63 3.61 2.62.628.647 1.036.85 1.701.85h2.516c.7 0 .991-.326.786-.96-.302-.913-1.89-3.793-2.607-4.735-.386-.499-.345-.712.016-1.189.023-.03 2.13-2.887 2.378-4.01.127-.58-.1-.99-.81-.99h-2.527c-.551 0-.814.341-.95.704-.139.362-.647 1.637-1.472 2.92-.619 1.038-.905 1.632-1.22 1.632-.162 0-.353-.223-.353-.743V7.644c0-.623-.19-.915-.747-.915H9.682c-.347 0-.58.21-.58.46 0 .445.694.512.756 1.666v3.297c0 .762-.163.905-.487.905-.913 0-3.136-3.321-4.453-7.202-.234-.693-.5-.915-1.077-.915H1.272c-.63 0-.763.303-.763.634 0 .584.887 3.511 4.102 7.792 2.144 2.871 5.161 4.417 7.9 4.417z"/></svg>
            ВКонтакте
        </a>
    </div>
</body>
</html>
