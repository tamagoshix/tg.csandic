<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>csandic | Profile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 80%;
            max-width: 320px;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; letter-spacing: -1px; }
        p { color: #aaa; margin-bottom: 30px; font-size: 14px; }
        .btn {
            display: block;
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="card">
        <h1>csandic</h1>
        <p>Designer & Developer</p>
        <a href="https://t.me/csandic" class="btn">Связаться со мной</a>
    </div>
</body>
</html>
